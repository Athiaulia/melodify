<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melodify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 40 40" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="logoGrad" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#9b6dff"/>
            <stop offset="55%" stop-color="#6a3fcb"/>
            <stop offset="100%" stop-color="#3b2a8a"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="1.2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <circle cx="20" cy="20" r="19" fill="url(#logoGrad)"/>
        <circle cx="20" cy="20" r="19" fill="none" stroke="rgba(180,140,255,0.35)" stroke-width="0.8"/>
        <g filter="url(#glow)" stroke="white" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="10.5" cy="27" rx="2.8" ry="2" fill="white" stroke="none" transform="rotate(-15,10.5,27)"/>
          <line x1="13.2" y1="26.2" x2="13.2" y2="17" stroke="white" stroke-width="1.5" fill="none"/>
          <ellipse cx="17.5" cy="23" rx="2.8" ry="2" fill="white" stroke="none" transform="rotate(-15,17.5,23)"/>
          <line x1="20.2" y1="22.2" x2="20.2" y2="13" stroke="white" stroke-width="1.5" fill="none"/>
          <ellipse cx="24.5" cy="19" rx="2.8" ry="2" fill="white" stroke="none" transform="rotate(-15,24.5,19)"/>
          <line x1="27.2" y1="18.2" x2="27.2" y2="9" stroke="white" stroke-width="1.5" fill="none"/>
          <path d="M8 10 Q6 18.5 8 27" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.4"/>
          <polyline points="6.5,25.5 8,27.5 9.5,25.5" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.2"/>
        </g>
      </svg>
      <span>Melodify</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
        Beranda
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Cari
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Pustaka
      </a>
    </nav>

    <div class="sidebar-section">
      <div class="section-title">PLAYLIST</div>
      <ul class="playlist-list">
        <li class="playlist-item active">Lagu Favorit</li>
        <li class="playlist-item">K-Pop Hits</li>
        <li class="playlist-item">Chill Vibes</li>
        <li class="playlist-item">Top Charts</li>
      </ul>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-nav">
        <button class="nav-arrow" onclick="history.back()">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <button class="nav-arrow">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Cari artis, lagu, atau podcast" oninput="filterSongs()">
      </div>
      <div class="user-pill">
        <div class="user-avatar">M</div>
        <span>Melodify</span>
      </div>
    </div>

    <!-- FEATURED BANNER -->
    <div class="featured-banner" id="featuredBanner">
      <div class="featured-bg" id="featuredBg"></div>
      <div class="featured-content">
        <span class="featured-tag">🎵 Sedang Populer</span>
        <h1 id="featuredTitle">Pilih Lagu</h1>
        <p id="featuredArtist">Jelajahi koleksi musik terbaik</p>
        <div class="featured-actions">
          <button class="btn-play-big" id="featuredPlayBtn" onclick="playFeatured()">
            <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>
            Putar
          </button>
          <button class="btn-heart" id="featuredLikeBtn" onclick="toggleLike(-1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>
      </div>
      <div class="featured-cover" id="featuredCover">
        <div class="cover-placeholder">🎵</div>
      </div>
    </div>

    <!-- SONG SECTIONS -->
    <section class="section">
      <div class="section-header">
        <h2>Lagu Populer</h2>
        <a href="#" class="see-all">Lihat Semua</a>
      </div>
      <div class="songs-grid" id="songs"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>Baru Saja Diputar</h2>
      </div>
      <div class="recent-list" id="recentList"></div>
    </section>
  </main>

</div>

<!-- PLAYER BAR -->
<div class="player-bar">
  <div class="player-left">
    <div class="player-thumb" id="playerThumb">
      <div class="thumb-placeholder">🎵</div>
    </div>
    <div class="player-info">
      <div class="player-title" id="playerTitle">Pilih lagu untuk diputar</div>
      <div class="player-artist" id="playerArtist">—</div>
    </div>
    <button class="player-like" id="playerLikeBtn" onclick="toggleLike(currentSong)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
  </div>

  <div class="player-center">
    <div class="player-controls">
      <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </button>
      <button class="ctrl-btn" onclick="prevSong()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="playBtn" onclick="playPause()">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextSong()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.5 3.89L8 17.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
    <div class="progress-row">
      <span class="time" id="currentTime">0:00</span>
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb" id="progressThumb"></div>
        <input type="range" id="progress" value="0" min="0" max="100" step="0.1">
      </div>
      <span class="time" id="duration">0:00</span>
    </div>
  </div>

  <div class="player-right">
    <button class="ctrl-btn" onclick="toggleMute()">
      <svg id="volIcon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </button>
    <div class="volume-track">
      <div class="volume-fill" id="volumeFill" style="width:80%"></div>
      <input type="range" id="volume" value="80" min="0" max="100">
    </div>
  </div>
</div>

<audio id="audio"></audio>
<script src="script.js"></script>
</body>
</html>
